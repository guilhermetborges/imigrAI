name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      APP_ENV: dev
      DATABASE_URL: sqlite+aiosqlite:///./data/imigrai-sonar-test.db
      ALEMBIC_DATABASE_URL: sqlite:///./data/imigrai-sonar-test.db
      TEST_DATABASE_URL: sqlite+aiosqlite:///:memory:
      REDIS_URL: memory://
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      CELERY_TASK_ALWAYS_EAGER: "true"
      INIT_LOCAL_DATABASE: "true"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
      JWT_SECRET_KEY: sonar-test-secret
      INGESTION_INTERNAL_TOKEN: sonar-test-token

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend tests
        run: pytest --cov=app --cov=apps --cov-report=xml --cov-report=term-missing --cov-fail-under=85 --junitxml=pytest-report.xml

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
