name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: imigrai_test
          POSTGRES_USER: imigrai
          POSTGRES_PASSWORD: imigrai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imigrai -d imigrai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://imigrai:imigrai@localhost:5432/imigrai_test
      ALEMBIC_DATABASE_URL: postgresql+psycopg://imigrai:imigrai@localhost:5432/imigrai_test
      TEST_DATABASE_URL: postgresql+asyncpg://imigrai:imigrai@localhost:5432/imigrai_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      JWT_SECRET_KEY: ci-secret
      INGESTION_INTERNAL_TOKEN: ci-internal-token
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import socket, time
          for _ in range(60):
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=2):
                      print("postgres is ready")
                      raise SystemExit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit("postgres did not become ready in time")
          PY

      - name: Migrate test database
        run: python scripts/run_migrations_safe.py --database-url "$DATABASE_URL" --alembic-database-url "$ALEMBIC_DATABASE_URL" --label "ci-test-db"

      - name: Lint backend
        run: |
          ruff check .
          black --check .

      - name: Test backend
        run: pytest -q

  frontend:
    name: Frontend Lint + Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend unit
        run: npm run test

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - frontend-e2e
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile -t imigrai-api:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t imigrai-frontend:ci frontend
