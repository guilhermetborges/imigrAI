name: Production CD

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push backend image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/imigrai-api:${{ github.sha }}"
          docker build -f Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Build and push frontend image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/imigrai-frontend:${{ github.sha }}"
          docker build -f frontend/Dockerfile -t "$IMAGE" frontend
          docker push "$IMAGE"

  production-migrate:
    name: Production Migration Validation
    runs-on: ubuntu-latest
    needs: publish-images
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run production migrations safely
        run: |
          python scripts/run_migrations_safe.py \
            --database-url "${{ secrets.PRODUCTION_DATABASE_URL }}" \
            --alembic-database-url "${{ secrets.PRODUCTION_ALEMBIC_DATABASE_URL }}" \
            --label "production"

  production-deploy:
    name: Deploy Production (Manual Approval)
    runs-on: ubuntu-latest
    needs: production-migrate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trigger production deploy
        run: |
          python scripts/deploy_webhook.py \
            --url "${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}" \
            --environment production \
            --sha "${{ github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --token "${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_TOKEN }}"

  production-seed-and-smoke:
    name: Seed + Smoke Production
    runs-on: ubuntu-latest
    needs: production-deploy
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      ALEMBIC_DATABASE_URL: ${{ secrets.PRODUCTION_ALEMBIC_DATABASE_URL }}
      REDIS_URL: ${{ secrets.PRODUCTION_REDIS_URL }}
      CELERY_BROKER_URL: ${{ secrets.PRODUCTION_REDIS_URL }}
      CELERY_RESULT_BACKEND: ${{ secrets.PRODUCTION_REDIS_RESULT_BACKEND }}
      JWT_SECRET_KEY: ${{ secrets.PRODUCTION_JWT_SECRET_KEY }}
      INGESTION_INTERNAL_TOKEN: ${{ secrets.PRODUCTION_INGESTION_INTERNAL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Seed initial data on production
        run: python scripts/seed_initial_data.py

      - name: Smoke tests on production
        run: |
          python scripts/smoke_test.py \
            --base-url "${{ secrets.PRODUCTION_API_BASE_URL }}" \
            --run-auth-flow \
            --email-prefix "prod-smoke"
