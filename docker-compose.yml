services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/imigrai.db
      ALEMBIC_DATABASE_URL: sqlite:///./data/imigrai.db
      REDIS_URL: memory://
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      CELERY_TASK_ALWAYS_EAGER: "true"
      INIT_LOCAL_DATABASE: "true"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/data
      - api_cache:/app/.cache

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3002:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  api_data:
  api_cache:
